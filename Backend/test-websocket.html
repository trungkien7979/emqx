<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time IoT Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #38bdf8;
        --accent: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
      }

      body {
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
      }

      .container {
        max-width: 900px;
        width: 100%;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        border-radius: 999px;
        background: rgba(16, 185, 129, 0.1);
        color: var(--accent);
        font-size: 0.875rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid rgba(16, 185, 129, 0.2);
      }

      .status.disconnected {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
        border-color: rgba(239, 68, 68, 0.2);
      }

      .indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: var(--accent);
        box-shadow: 0 0 12px var(--accent);
        animation: pulse 2s infinite;
      }

      .status.disconnected .indicator {
        background-color: var(--danger);
        box-shadow: 0 0 8px var(--danger);
        animation: none;
      }

      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        transition:
          transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          box-shadow 0.4s ease;
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.1);
      }

      .card-title {
        font-size: 1.1rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 700;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon-box {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-temp {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }
      .icon-hum {
        background: rgba(56, 189, 248, 0.1);
        color: var(--primary);
      }

      .value {
        font-size: 4rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 10px;
        display: flex;
        align-items: baseline;
        gap: 8px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      }

      .unit {
        font-size: 1.5rem;
        color: var(--text-muted);
        font-weight: 600;
      }

      .meta {
        font-size: 0.9rem;
        color: var(--text-muted);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 16px;
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .tag {
        background: rgba(255, 255, 255, 0.05);
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 0.8rem;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      .value-update {
        animation: flash 0.6s ease-out;
      }

      @keyframes flash {
        0% {
          color: var(--primary);
          transform: scale(1.05);
          text-shadow: 0 0 20px var(--primary);
        }
        100% {
          color: var(--text-main);
          transform: scale(1);
          text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
      }

      .log-container {
        margin-top: 40px;
        background: rgba(15, 23, 42, 0.6);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 20px;
        max-height: 250px;
        overflow-y: auto;
        font-family: 'Fira Code', monospace;
        font-size: 0.85rem;
        color: #a7f3d0;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      .log-container::-webkit-scrollbar {
        width: 8px;
      }

      .log-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }

      .log-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      .log-entry {
        margin-bottom: 10px;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        padding-bottom: 8px;
        line-height: 1.5;
      }

      .log-time {
        color: #64748b;
        margin-right: 10px;
      }

      .log-keyword {
        color: #f472b6;
      }
      .log-string {
        color: #93c5fd;
      }
      .log-number {
        color: #fde047;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>IoT Monitoring Dashboard</h1>
        <div id="connectionStatus" class="status disconnected">
          <div class="indicator"></div>
          <span id="statusText">Awaiting server...</span>
        </div>
      </div>

      <div class="dashboard">
        <!-- Temperature Card -->
        <div class="card">
          <div class="card-title">
            <div class="icon-box icon-temp">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"
                ></path>
              </svg>
            </div>
            Temperature
          </div>
          <div class="value">
            <span id="tempValue">--</span><span class="unit">°C</span>
          </div>
          <div class="meta">
            <span class="tag" id="tempDevice">Waiting for data...</span>
            <span id="tempTime">--:--:--</span>
          </div>
        </div>

        <!-- Humidity Card -->
        <div class="card">
          <div class="card-title">
            <div class="icon-box icon-hum">
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
              </svg>
            </div>
            Humidity
          </div>
          <div class="value">
            <span id="humValue">--</span><span class="unit">%</span>
          </div>
          <div class="meta">
            <span class="tag" id="humDevice">Waiting for data...</span>
            <span id="humTime">--:--:--</span>
          </div>
        </div>
      </div>

      <div class="log-container" id="logContainer">
        <div
          style="
            opacity: 0.5;
            text-align: center;
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
          "
        >
          Awaiting incoming data stream from Gateway...
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      // Syntax highlighting for better looking logs
      function syntaxHighlight(json) {
        if (typeof json != 'string') json = JSON.stringify(json, undefined, 2);
        json = json
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        return json.replace(
          /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
          function (match) {
            let cls = 'log-number';
            if (/^"/.test(match)) {
              if (/:$/.test(match)) {
                cls = 'log-keyword';
              } else {
                cls = 'log-string';
              }
            } else if (/true|false/.test(match)) {
              cls = 'log-keyword';
            } else if (/null/.test(match)) {
              cls = 'log-keyword';
            }
            return '<span class="' + cls + '">' + match + '</span>';
          },
        );
      }

      const socket = io('http://localhost:3000');
      const statusEl = document.getElementById('connectionStatus');
      const statusText = document.getElementById('statusText');

      const tempValue = document.getElementById('tempValue');
      const tempDevice = document.getElementById('tempDevice');
      const tempTime = document.getElementById('tempTime');

      const humValue = document.getElementById('humValue');
      const humDevice = document.getElementById('humDevice');
      const humTime = document.getElementById('humTime');

      const logContainer = document.getElementById('logContainer');

      socket.on('connect', () => {
        statusEl.classList.remove('disconnected');
        statusText.textContent = 'Live System Connected';
      });

      socket.on('disconnect', () => {
        statusEl.classList.add('disconnected');
        statusText.textContent = 'System Disconnected';
      });

      socket.on('device_data', (data) => {
        const payload = typeof data === 'string' ? JSON.parse(data) : data;
        const date = new Date(payload.time || Date.now());
        const timeStr = date.toLocaleTimeString();

        // Temperature update
        if (payload.temperature !== undefined) {
          const currentTemp = parseFloat(payload.temperature).toFixed(1);
          if (tempValue.textContent !== currentTemp) {
            tempValue.textContent = currentTemp;
            triggerAnimation(tempValue);
          }
        }
        tempDevice.textContent = `${payload.gatewayId || 'GW'} / ${payload.deviceId || 'DEV'}`;
        tempTime.textContent = timeStr;

        // Humidity update
        if (payload.humidity !== undefined) {
          const currentHum = parseFloat(payload.humidity).toFixed(1);
          if (humValue.textContent !== currentHum) {
            humValue.textContent = currentHum;
            triggerAnimation(humValue);
          }
        }
        humDevice.textContent = `${payload.gatewayId || 'GW'} / ${payload.deviceId || 'DEV'}`;
        humTime.textContent = timeStr;

        addLogEntry(payload, date);
      });

      function triggerAnimation(element) {
        element.classList.remove('value-update');
        void element.offsetWidth; // trigger reflow
        element.classList.add('value-update');
      }

      function addLogEntry(data, date) {
        if (logContainer.querySelector('div[style]')) {
          logContainer.innerHTML = '';
        }

        const timeStr = date.toISOString().split('T')[1].slice(0, 12); // HH:MM:SS.mmm

        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-time">[${timeStr}]</span> RCV ➔ ${syntaxHighlight(data)}`;
        logContainer.prepend(entry);

        if (logContainer.children.length > 50) {
          logContainer.removeChild(logContainer.lastChild);
        }
      }
    </script>
  </body>
</html>
